#zeropsPreprocessor=on
# ─────────────────────────────────────────────────────────────────────────
# ZRNO — REMOTE CDE (cloud development environment)
#
# A single `app` runtime built from git that idles in DEV mode so you can
# develop ZRNO entirely in the cloud — open the container in a remote IDE
# (VS Code Remote / JetBrains Gateway), run the dev server inside it, and
# reach the managed services by hostname with zero local setup. Backed by
# PostgreSQL, object storage, Meilisearch and Mailpit. Lightweight plan.
#
# Stripe OMITTED → simulated checkout. Add keys later to enable real Stripe.
# ─────────────────────────────────────────────────────────────────────────
project:
  name: zrno-coffee-cde
  corePackage: LIGHT
  tags:
    - zrno
    - tanstack-start
  envVariables:
    BETTER_AUTH_SECRET: <@generateRandomString(<48>)>
    ADMIN_EMAIL: admin@zrno.cz
    ADMIN_PASSWORD: <@generateRandomString(<16>)>

services:
  - hostname: db
    type: postgresql@16
    mode: NON_HA
    priority: 10

  - hostname: storage
    type: object-storage
    priority: 10
    objectStorageSize: 5
    objectStoragePolicy: public-objects-read

  # Meilisearch — back-office ⌘K search. Floored at 1 GB to avoid OOM.
  - hostname: search
    type: meilisearch@1.44
    mode: NON_HA
    priority: 10
    verticalAutoscaling:
      minRam: 1

  - hostname: mailpit
    type: alpine@3.20
    priority: 10
    enableSubdomainAccess: true
    buildFromGit: https://github.com/zeropsio/recipe-mailpit

  # Cloud dev workspace — builds from git once, then idles so you attach a
  # remote IDE and run the dev server inside the container.
  - hostname: app
    type: nodejs@24
    enableSubdomainAccess: true
    buildFromGit: https://github.com/fxck/zrno-coffee
    zeropsSetup: dev
    maxContainers: 1
