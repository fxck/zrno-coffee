#zeropsPreprocessor=on
# ─────────────────────────────────────────────────────────────────────────
# ZRNO — SMALL PRODUCTION
#
# A production-ready setup tuned for moderate throughput: the `app` runtime
# scales 1–2 containers on SHARED CPU with health-gated rolling deploys
# (zero downtime), while the managed services stay single-instance (NON_HA)
# with snapshot backups. Cheaper than the HA topology — pick this to run ZRNO
# in production without the 3-node database + dedicated-CPU overhead.
#
# Email: ships with Mailpit. For real email set SMTP_HOST / SMTP_PORT /
# credentials in the project env and remove the mailpit service.
# Payments: add STRIPE_SECRET_KEY + STRIPE_PUBLISHABLE_KEY (LIVE) to enable
# real Stripe Checkout; without them the app runs in simulated mode.
# ─────────────────────────────────────────────────────────────────────────
project:
  name: zrno-coffee-prod-small
  corePackage: SERIOUS
  tags:
    - zrno
    - tanstack-start
    - production
  envVariables:
    BETTER_AUTH_SECRET: <@generateRandomString(<48>)>
    ADMIN_EMAIL: admin@zrno.cz
    ADMIN_PASSWORD: <@generateRandomString(<20>)>

services:
  # Single-instance PostgreSQL (snapshot backups, no auto-failover).
  - hostname: db
    type: postgresql@16
    mode: NON_HA
    priority: 10
    verticalAutoscaling:
      minRam: 1

  - hostname: storage
    type: object-storage
    priority: 10
    objectStorageSize: 10
    objectStoragePolicy: public-objects-read

  # Meilisearch — back-office ⌘K search. Floored at 1 GB to avoid OOM.
  - hostname: search
    type: meilisearch@1.44
    mode: NON_HA
    priority: 10
    verticalAutoscaling:
      minRam: 1

  # Mailpit catcher (swap for a real SMTP provider in production).
  - hostname: mailpit
    type: alpine@3.20
    priority: 10
    enableSubdomainAccess: true
    buildFromGit: https://github.com/zeropsio/recipe-mailpit

  # Production app — 1–2 shared-CPU containers, health-gated rolling deploys.
  - hostname: app
    type: nodejs@24
    enableSubdomainAccess: true
    buildFromGit: https://github.com/fxck/zrno-coffee
    zeropsSetup: prod
    minContainers: 1
    maxContainers: 2
    verticalAutoscaling:
      cpuMode: SHARED
      minRam: 0.5
